<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Harga Crypto</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: linear-gradient(135deg, #13131a 0%, #1c1c24 100%);
            color: #ffffff; text-align: center; padding: 30px 15px; margin: 0; min-height: 100vh;
        }
        h1 { color: #f3ba2f; margin-bottom: 5px; font-size: 2em; }
        p { margin-top: 5px; color: #a0a0b0; }
        
        /* Mengatur tata letak deretan tombol di atas */
        .kontrol-menu {
            display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; flex-wrap: wrap;
        }

        /* Desain tombol-tombol kita */
        .btn-aksi {
            background-color: #2c2c3a; color: #f3ba2f; border: 1px solid #f3ba2f;
            padding: 10px 20px; border-radius: 20px; font-size: 0.9em; font-weight: bold;
            cursor: pointer; transition: all 0.3s ease;
        }
        .btn-aksi:hover { background-color: #f3ba2f; color: #13131a; }

        #waktu-update { font-size: 0.9em; color: #888899; margin-bottom: 25px; font-style: italic; }
        
        .crypto-container { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; }
        
        .card { 
            background-color: #252530; padding: 25px 20px; border-radius: 16px; 
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4); width: 240px; 
            border: 1px solid #333344; transition: transform 0.3s ease; text-align: left;
        }
        .card:hover { transform: translateY(-5px); box-shadow: 0 12px 25px rgba(0,0,0,0.6); }
        
        .coin-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .coin-icon { width: 32px; height: 32px; }
        .coin-name { font-size: 1.2em; font-weight: bold; color: #e0e0e0; }
        
        .coin-price { font-size: 1.4em; color: #ffffff; font-weight: bold; margin-bottom: 5px; }
        .coin-change { font-size: 0.9em; font-weight: bold; margin-bottom: 15px; }
        .naik { color: #00e676; } 
        .turun { color: #ff5252; } 
        
        .input-grup label { font-size: 0.9em; color: #a0a0b0; display: block; margin-bottom: 5px; }
        .input-grup input {
            width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #444455;
            background-color: #1a1a24; color: white; font-size: 1em; margin-bottom: 15px;
            box-sizing: border-box; 
        }
        .input-grup input:focus { outline: none; border-color: #f3ba2f; } 
        
        .total-nilai { font-size: 1.2em; color: #f3ba2f; font-weight: bold; border-top: 1px solid #444455; padding-top: 15px;}

        .grand-total-container {
            background: linear-gradient(135deg, #f3ba2f 0%, #ff9800 100%);
            color: #13131a; margin-top: 30px; padding: 20px; border-radius: 16px;
            display: inline-block; min-width: 250px; box-shadow: 0 8px 25px rgba(243, 186, 47, 0.4);
        }
        .grand-total-container h2 { margin: 0 0 10px 0; font-size: 1.1em; color: #332200; }
        #grand-total-angka { font-size: 2em; font-weight: bold; }

        /* Wadah Grafik yang sudah diperbaiki */
        .chart-container {
            margin-top: 40px; max-width: 800px; margin-left: auto; margin-right: auto;
            height: 450px; border-radius: 16px; overflow: hidden;
            box-shadow: 0 8px 25px rgba(0,0,0,0.5); border: 1px solid #333344; background-color: #252530;
        }
    </style>
</head>
<body>

    <h1>Dashboard Crypto Pro</h1>
    <p>Pantau & Hitung Aset Anda Secara Real-Time</p>
    
    <div class="kontrol-menu">
        <button class="btn-aksi" id="btn-currency" onclick="gantiMataUang()">💵 USD 🇺🇸</button>
        <button class="btn-aksi" id="btn-sensor" onclick="toggleSensor()">👁️ Sembunyikan Saldo</button>
    </div>

    <div id="waktu-update">Terakhir diperbarui: Memuat waktu...</div>

    <div class="crypto-container">
        <div class="card">
            <div class="coin-header">
                <img src="https://upload.wikimedia.org/wikipedia/commons/4/46/Bitcoin.svg" class="coin-icon" alt="BTC">
                <div class="coin-name">Bitcoin (BTC)</div>
            </div>
            <div class="coin-price" id="harga-btc">Memuat...</div>
            <div class="coin-change" id="change-btc">0.00%</div>
            <div class="input-grup">
                <label>Jumlah koin Anda:</label>
                <input type="number" id="input-btc" placeholder="0" oninput="hitungTotal()">
            </div>
            <div class="total-nilai" id="total-btc">Total: 0</div>
        </div>

        <div class="card">
            <div class="coin-header">
                <img src="https://upload.wikimedia.org/wikipedia/commons/0/05/Ethereum_logo_2014.svg" class="coin-icon" alt="ETH">
                <div class="coin-name">Ethereum (ETH)</div>
            </div>
            <div class="coin-price" id="harga-eth">Memuat...</div>
            <div class="coin-change" id="change-eth">0.00%</div>
            <div class="input-grup">
                <label>Jumlah koin Anda:</label>
                <input type="number" id="input-eth" placeholder="0" oninput="hitungTotal()">
            </div>
            <div class="total-nilai" id="total-eth">Total: 0</div>
        </div>

        <div class="card">
            <div class="coin-header">
                <img src="https://raw.githubusercontent.com/trustwallet/assets/master/blockchains/binance/info/logo.png" class="coin-icon" alt="BNB">
                <div class="coin-name">Binance (BNB)</div>
            </div>
            <div class="coin-price" id="harga-bnb">Memuat...</div>
            <div class="coin-change" id="change-bnb">0.00%</div>
            <div class="input-grup">
                <label>Jumlah koin Anda:</label>
                <input type="number" id="input-bnb" placeholder="0" oninput="hitungTotal()">
            </div>
            <div class="total-nilai" id="total-bnb">Total: 0</div>
        </div>
    </div>

    <div class="grand-total-container">
        <h2>ESTIMASI TOTAL KEKAYAAN</h2>
        <div id="grand-total-angka">0</div>
    </div>

    <div class="chart-container">
        <iframe 
            src="https://s.tradingview.com/widgetembed/?symbol=BINANCE%3ABTCUSDT&interval=D&hidesidetoolbar=1&symboledit=1&saveimage=1&toolbarbg=f1f3f6&theme=dark&style=1&timezone=Asia%2FJakarta&locale=id" 
            width="100%" 
            height="100%" 
            frameborder="0" 
            allowtransparency="true" 
            scrolling="no" 
            allowfullscreen="">
        </iframe>
    </div>

    <script>
        let mataUangAktif = 'idr';
        let simbolUang = 'Rp ';
        let hargaBitcoinSekarang = 0; let hargaEthereumSekarang = 0; let hargaBinanceSekarang = 0;
        
        // Memori status sensor (apakah mata ditutup atau dibuka)
        let saldoDisensor = false;

        document.getElementById('input-btc').value = localStorage.getItem('simpananBtc') || '';
        document.getElementById('input-eth').value = localStorage.getItem('simpananEth') || '';
        document.getElementById('input-bnb').value = localStorage.getItem('simpananBnb') || '';

        // Fungsi baru untuk Mode Privasi
        function toggleSensor() {
            saldoDisensor = !saldoDisensor; // Membalikkan status (benar jadi salah, salah jadi benar)
            const tombolSensor = document.getElementById('btn-sensor');
            
            if (saldoDisensor) {
                tombolSensor.innerText = '👀 Tampilkan Saldo';
            } else {
                tombolSensor.innerText = '👁️ Sembunyikan Saldo';
            }
            
            // Langsung perbarui tampilan
            hitungTotal();
        }

        function gantiMataUang() {
            const tombol = document.getElementById('btn-currency');
            if (mataUangAktif === 'idr') {
                mataUangAktif = 'usd'; simbolUang = '$'; tombol.innerText = 'IDR 🇮🇩';
            } else {
                mataUangAktif = 'idr'; simbolUang = 'Rp '; tombol.innerText = 'USD 🇺🇸';
            }
            document.getElementById('harga-btc').innerText = 'Memuat...';
            document.getElementById('harga-eth').innerText = 'Memuat...';
            document.getElementById('harga-bnb').innerText = 'Memuat...';
            ambilHargaCrypto();
        }

        async function ambilHargaCrypto() {
            const url = `https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,binancecoin&vs_currencies=${mataUangAktif}&include_24hr_change=true`;

            try {
                const response = await fetch(url);
                const data = await response.json();

                hargaBitcoinSekarang = data.bitcoin[mataUangAktif];
                hargaEthereumSekarang = data.ethereum[mataUangAktif];
                hargaBinanceSekarang = data.binancecoin[mataUangAktif];

                const formatLokal = mataUangAktif === 'idr' ? 'id-ID' : 'en-US';

                document.getElementById('harga-btc').innerText = simbolUang + hargaBitcoinSekarang.toLocaleString(formatLokal);
                document.getElementById('harga-eth').innerText = simbolUang + hargaEthereumSekarang.toLocaleString(formatLokal);
                document.getElementById('harga-bnb').innerText = simbolUang + hargaBinanceSekarang.toLocaleString(formatLokal);

                aturPersentase('change-btc', data.bitcoin[`${mataUangAktif}_24h_change`]);
                aturPersentase('change-eth', data.ethereum[`${mataUangAktif}_24h_change`]);
                aturPersentase('change-bnb', data.binancecoin[`${mataUangAktif}_24h_change`]);

                const waktuSekarang = new Date(); 
                document.getElementById('waktu-update').innerText = 'Data akurat per: ' + waktuSekarang.toLocaleTimeString('id-ID');

                hitungTotal();

            } catch (error) {
                console.error('Terjadi kesalahan:', error);
                document.getElementById('waktu-update').innerText = 'Gagal terhubung ke server. Coba matikan VPN.';
            }
        }

        function aturPersentase(idElemen, persentase) {
            const elemen = document.getElementById(idElemen);
            const teksAngka = persentase.toFixed(2) + '%'; 
            if (persentase > 0) {
                elemen.innerText = '▲ +' + teksAngka; elemen.className = 'coin-change naik'; 
            } else {
                elemen.innerText = '▼ ' + teksAngka; elemen.className = 'coin-change turun'; 
            }
        }

        function hitungTotal() {
            const inputBtcValue = document.getElementById('input-btc').value;
            const inputEthValue = document.getElementById('input-eth').value;
            const inputBnbValue = document.getElementById('input-bnb').value;

            localStorage.setItem('simpananBtc', inputBtcValue);
            localStorage.setItem('simpananEth', inputEthValue);
            localStorage.setItem('simpananBnb', inputBnbValue);

            const jumlahBtc = Number(inputBtcValue) || 0;
            const jumlahEth = Number(inputEthValue) || 0;
            const jumlahBnb = Number(inputBnbValue) || 0;

            const totalBtc = jumlahBtc * hargaBitcoinSekarang;
            const totalEth = jumlahEth * hargaEthereumSekarang;
            const totalBnb = jumlahBnb * hargaBinanceSekarang;
            const grandTotal = totalBtc + totalEth + totalBnb;

            const formatLokal = mataUangAktif === 'idr' ? 'id-ID' : 'en-US';

            // --- LOGIKA SENSOR ---
            // Jika tombol sensor diklik, tampilkan bintang. Jika tidak, tampilkan angka asli.
            if (saldoDisensor) {
                document.getElementById('total-btc').innerText = 'Total: ' + simbolUang + ' ***';
                document.getElementById('total-eth').innerText = 'Total: ' + simbolUang + ' ***';
                document.getElementById('total-bnb').innerText = 'Total: ' + simbolUang + ' ***';
                document.getElementById('grand-total-angka').innerText = simbolUang + ' ***';
            } else {
                document.getElementById('total-btc').innerText = 'Total: ' + simbolUang + totalBtc.toLocaleString(formatLokal);
                document.getElementById('total-eth').innerText = 'Total: ' + simbolUang + totalEth.toLocaleString(formatLokal);
                document.getElementById('total-bnb').innerText = 'Total: ' + simbolUang + totalBnb.toLocaleString(formatLokal);
                document.getElementById('grand-total-angka').innerText = simbolUang + grandTotal.toLocaleString(formatLokal);
            }
        }

        ambilHargaCrypto();
        setInterval(ambilHargaCrypto, 30000); 

    </script>
</body>
</html>
